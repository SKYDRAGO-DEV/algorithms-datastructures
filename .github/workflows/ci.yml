name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: TypeScript tests
        run: npm install && npm test
      - name: Python tests
        run: python3 -m pytest src/py/ 2>/dev/null || echo "no pytest"
